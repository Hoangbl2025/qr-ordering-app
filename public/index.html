<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Điện Tử - Đặt Món</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Menu Của Quán</h1>
            <p class="subtitle" id="table-display">Đang tải bàn...</p>
        </header>

        <div class="menu-list" id="menu-list">
            <!-- Món ăn sẽ được render ở đây -->
        </div>

        <div class="cart-summary">
            <div class="total-row">
                <span>Tổng cộng:</span>
                <span id="total-price">0 đ</span>
            </div>
            <button class="checkout-btn" id="checkout-btn" disabled>Gửi Đơn Hàng</button>
        </div>

        <!-- Màn hình trạng thái -->
        <div class="status-overlay" id="status-overlay">
            <div class="status-icon" id="status-icon">🕒</div>
            <div class="status-text" id="status-text">Đã gửi đơn hàng</div>
            <div class="status-subtext" id="status-subtext">Vui lòng đợi trong giây lát...</div>
            <div id="qr-container" style="display: none; margin-top: 20px;">
                <p style="font-weight: bold; margin-bottom: 10px;">Quét mã VietQR để thanh toán</p>
                <img id="vietqr-img" src="" alt="VietQR" style="width: 200px; height: 200px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            </div>
            <button style="margin-top: 30px; display: none;" id="new-order-btn">Đặt món khác</button>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
